<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>戳戳 v2.0 — Desktop Pet</title>
<style>
:root {
  --bg:#1a1a1a; --card:#252525; --text:#e0d8d0; --muted:#888;
  --accent:#ff6b35; --pink:#e8879a; --blue:#5b9bd5; --green:#6baf6b; --yellow:#f0c040;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'PingFang SC',-apple-system,sans-serif; background:var(--bg); color:var(--text);
  display:flex; flex-direction:column; align-items:center; min-height:100vh;
  user-select:none; -webkit-user-select:none; overflow:hidden;
}
/* Pet area */
.pet-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0.5rem;width:100%}
.pet{
  display:grid;grid-template-columns:repeat(16,1fr);grid-template-rows:repeat(16,1fr);
  width:min(240px,60vw);height:min(240px,60vw);gap:2px;cursor:pointer;transition:transform .1s;
}
.pet:active{transform:scale(.9)}
.pet.bounce{animation:bounce .4s ease}.pet.spin{animation:spin .5s ease}.pet.shake{animation:shake .3s ease}
@keyframes bounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-20px)}60%{transform:translateY(-5px)}}
@keyframes spin{0%{transform:rotate(0)scale(1)}50%{transform:rotate(10deg)scale(1.1)}100%{transform:rotate(0)scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.px{border-radius:3px;transition:background .3s}
/* Info */
.info{text-align:center;padding:.25rem}
.name-row{display:flex;align-items:center;justify-content:center;gap:.3rem;font-size:1.1rem;font-weight:700}
.lv{background:var(--accent);color:#fff;font-size:.65rem;padding:.1rem .4rem;border-radius:8px}
.coins{font-size:.75rem;color:var(--yellow)}
/* Stat bars */
.bars{width:200px;margin:.3rem auto}
.bar-row{display:flex;align-items:center;gap:.4rem;margin:.15rem 0;font-size:.65rem}
.bar-row .icon{width:16px;text-align:center}
.bar-row .label{width:20px;color:var(--muted)}
.bar-bg{flex:1;height:5px;background:#333;border-radius:3px}
.bar-fill{height:100%;border-radius:3px;transition:width .5s}
.bar-fill.hunger{background:var(--accent)}.bar-fill.happy{background:var(--pink)}.bar-fill.energy{background:var(--blue)}
/* XP */
.xp-wrap{width:200px;height:3px;background:#333;border-radius:2px;margin:.3rem auto}
.xp-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s}
/* Actions */
.actions{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;padding:.5rem}
.btn{
  padding:.45rem 1rem;border-radius:16px;border:none;font-size:.8rem;cursor:pointer;
  transition:all .15s;background:#252525;color:var(--text);border:1px solid #333;
  display:flex;align-items:center;gap:.3rem;
}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn:active{transform:scale(.95)}
.btn.accent{background:var(--accent);color:#fff;border:none}
.btn.small{padding:.3rem .7rem;font-size:.7rem}
/* Shop */
.shop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:20;align-items:center;justify-content:center}
.shop.open{display:flex}
.shop-card{background:var(--card);border-radius:20px;padding:1.5rem;max-width:360px;width:90%;max-height:80vh;overflow-y:auto}
.shop-card h3{margin-bottom:.75rem}
.shop-item{display:flex;align-items:center;gap:.75rem;padding:.5rem;border-bottom:1px solid #222}
.shop-item .icon{font-size:1.5rem}
.shop-item .info{flex:1;text-align:left}
.shop-item .name{font-size:.85rem}.shop-item .cost{font-size:.7rem;color:var(--muted)}
/* Bubble */
.bubble{
  position:fixed;top:20%;left:50%;transform:translateX(-50%);
  background:#333;color:var(--text);padding:.5rem 1rem;border-radius:16px;
  font-size:.85rem;z-index:10;animation:floatUp 2s ease forwards;pointer-events:none;
}
@keyframes floatUp{0%{opacity:1;transform:translateX(-50%)translateY(0)}100%{opacity:0;transform:translateX(-50%)translateY(-60px)}}
/* Streak */
.fire{animation:flicker .5s infinite alternate}@keyframes flicker{from{opacity:.7}to{opacity:1}}
/* Quests panel */
.quests{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:20;align-items:center;justify-content:center}
.quests.open{display:flex}
.quest-card{background:var(--card);border-radius:20px;padding:1.5rem;max-width:360px;width:90%}
.quest-item{padding:.4rem 0;border-bottom:1px solid #222;font-size:.8rem;display:flex;justify-content:space-between}
.quest-item .prog{color:var(--accent)}
</style></head><body>

<div class="pet-wrap">
  <div class="pet" id="pet" onclick="poke()"></div>
  <div class="info">
    <div class="name-row">
      <span id="name">戳戳</span><span class="lv" id="lv">Lv.1</span>
      <span id="fire-icon" style="display:none" class="fire">🔥</span>
    </div>
    <div class="coins">🪙 <span id="coins">0</span></div>
  </div>
  <div class="bars">
    <div class="bar-row"><span class="icon">🍔</span><span class="label">饱</span><div class="bar-bg"><div class="bar-fill hunger" id="hunger-bar"></div></div></div>
    <div class="bar-row"><span class="icon">😊</span><span class="label">乐</span><div class="bar-bg"><div class="bar-fill happy" id="happy-bar"></div></div></div>
    <div class="bar-row"><span class="icon">⚡</span><span class="label">力</span><div class="bar-bg"><div class="bar-fill energy" id="energy-bar"></div></div></div>
  </div>
  <div class="xp-wrap"><div class="xp-fill" id="xp-bar"></div></div>
  <div style="font-size:.65rem;color:var(--muted);margin-top:.15rem" id="stage-info">蛋</div>
</div>

<div class="actions">
  <button class="btn accent" onclick="poke()">👆 戳</button>
  <button class="btn" onclick="feed()">🍔 喂</button>
  <button class="btn" onclick="playGame()">🎮 玩</button>
  <button class="btn" onclick="sleepPet()">💤 睡</button>
  <button class="btn small" onclick="openShop()">🛍️</button>
  <button class="btn small" onclick="openQuests()">📋</button>
  <button class="btn small" onclick="renamePet()">✏️</button>
</div>

<!-- Shop -->
<div class="shop" id="shop"><div class="shop-card">
  <h3>🛍️ 配饰商店 <button class="btn small" onclick="closeShop()" style="float:right">✕</button></h3>
  <div id="shop-items"></div>
</div></div>

<!-- Quests -->
<div class="quests" id="quests"><div class="quest-card">
  <h3>📋 每日任务 <button class="btn small" onclick="closeQuests()" style="float:right">✕</button></h3>
  <div id="quest-items"></div>
  <div style="margin-top:.75rem"><strong>🏆 成就:</strong> <span id="ach-list"></span></div>
</div></div>

<script>
const A=location.origin.replace('5200','5200');
let S={},emotion='happy';

const MAPS={happy:`
........########......##......##.....##........##....##..##..##..##...#.............#...#..##....##..#...#....####....#...#.............#...#..#......#..#....#..........#.....##..##..##.......##....##........#......#.......#........#......##..##..##........######.....`,
sleepy:`................................########.....##......##.....##........##....#..........#....#...####...#....#..........#....#..........#....#..........#.....#...##...#......#......#.......#....#........#..#.........##....................`,
excited:`
....########....##......##...##........##..##..##..##..##..#..##....##..#..#............#..#....####....#..#...#....#...#..#..##....##..#..#..#......#..#..##..........##...##........##.....##..##..##.......##....##........#....#.......####......`,
love:`
................##........##..####......####..######..######..############..##########.....########.......######........####..........##...........##...........##...........##...........##..........##.##........##...##.......##.....##.....`,
hungry:`
.....######.......##....##......##......##.....##........##....##..##..##..##..#..##....##..#..#............#..#...######...#..#............#..#..##....##..#..##..........##...##........##.....##..##..##.......##....##.......#..##..#........##..##.....`,
surprised:`
....########....##......##...##........##..##..........##..#..##....##..#..#..##....##..#..#............#..#.....####...#..#....#....#..#..#....#....#..#..##..........##...##..####..##....##......##......########......................`};

function render(e){
  emotion=e; const m=(MAPS[e]||MAPS.happy).trim().split('\n').map(l=>l.trim());
  const pet=document.getElementById('pet'); pet.innerHTML='';
  const colors={'#':getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#ff6b35','.':'transparent'};
  for(let r=0;r<16;r++)for(let c=0;c<16;c++){
    const ch=(m[r]||'')[c]||'.'; const px=document.createElement('div');
    px.className='px'; px.style.background=ch==='#'?colors['#']:'transparent';
    pet.appendChild(px);
  }
}

async function api(path,method='GET',body=null){
  const o={method,headers:{'Content-Type':'application/json'}};
  if(body)o.body=JSON.stringify(body);
  const r=await fetch(A+path,o); return r.json();
}

async function load(){
  S=await api('/api/state');
  document.getElementById('name').textContent=S.name;
  document.getElementById('lv').textContent='Lv.'+S.level;
  document.getElementById('coins').textContent=S.coins;
  document.getElementById('hunger-bar').style.width=S.hunger+'%';
  document.getElementById('happy-bar').style.width=S.happiness+'%';
  document.getElementById('energy-bar').style.width=S.energy+'%';
  document.getElementById('xp-bar').style.width=(S.xp/S.xp_to_next*100)+'%';
  document.getElementById('stage-info').textContent=S.stage_name;
  document.getElementById('fire-icon').style.display=S.streak_days>=3?'inline':'none';
  if(!MAPS[emotion]||S.emotion!==emotion) render(S.emotion||'happy');
}

async function poke(){
  const p=document.getElementById('pet');
  p.classList.add(['bounce','spin','shake'][Math.floor(Math.random()*3)]);
  setTimeout(()=>p.classList.remove('bounce','spin','shake'),500);
  const d=await api('/api/poke','POST'); showBubble(d.message);
  if(d.quests_done?.length) showBubble('✅ '+d.quests_done.join(', '));
  if(d.achievements_new?.length) showBubble('🏆 '+d.achievements_new[0]);
  render(d.reaction); await load();
}

async function feed(){
  const d=await api('/api/feed','POST');
  if(d.error){showBubble(d.error);return}
  showBubble(d.message); render(d.reaction); await load();
}

async function playGame(){
  const d=await api('/api/play','POST');
  showBubble(d.message); render(d.reaction); await load();
}

async function sleepPet(){
  const d=await api('/api/sleep','POST');
  showBubble(d.message); render(d.reaction); await load();
}

async function renamePet(){
  const n=prompt('名字:',S.name); if(!n)return;
  await api('/api/rename','POST',{name:n}); S.name=n;
  document.getElementById('name').textContent=n; showBubble('我叫'+n+'！');
}

async function openShop(){
  document.getElementById('shop').classList.add('open');
  const items=[
    {id:'hat_cowboy',name:'牛仔帽',icon:'🤠',cost:200},
    {id:'hat_crown',name:'皇冠',icon:'👑',cost:500},
    {id:'glasses_cool',name:'墨镜',icon:'😎',cost:300},
    {id:'bow_tie',name:'领结',icon:'🎀',cost:150},
    {id:'cat_ears',name:'猫耳',icon:'🐱',cost:400},
  ];
  document.getElementById('shop-items').innerHTML=items.map(i=>`
    <div class="shop-item">
      <span class="icon">${i.icon}</span>
      <div class="info"><div class="name">${i.name}</div><div class="cost">🪙 ${i.cost}</div></div>
      <button class="btn small ${S.accessories?.includes(i.id)?'':'accent'}" onclick="buy('${i.id}')">${S.accessories?.includes(i.id)?'已拥有':'购买'}</button>
    </div>
  `).join('');
}

function closeShop(){document.getElementById('shop').classList.remove('open')}

async function buy(id){
  const d=await api('/api/buy','POST',{accessory_id:id});
  if(d.error) showBubble(d.error);
  else{showBubble('✅ 获得 '+d.bought); await load(); openShop();}
}

async function openQuests(){
  document.getElementById('quests').classList.add('open');
  const s=await api('/api/state');
  document.getElementById('quest-items').innerHTML=(s.quests||[]).map(q=>`
    <div class="quest-item">
      <span>${q.name}: ${q.desc}</span>
      <span class="prog">${q.progress}/${q.target} (+${q.reward_xp}XP)</span>
    </div>
  `).join('');
  document.getElementById('ach-list').textContent=(s.achievements||[]).map(id=>{
    const names={first_poke:'👆初见',poke_100:'💯百戳',poke_1000:'👑千戳',level_5:'⭐Lv5',level_10:'✨Lv10',streak_7:'🔥7天',all_care:'🏆全能'};
    return names[id]||id;
  }).join(' ');
}

function closeQuests(){document.getElementById('quests').classList.remove('open')}

function showBubble(m){
  const b=document.createElement('div');b.className='bubble';b.textContent=m;
  document.body.appendChild(b);setTimeout(()=>b.remove(),2200);
}

render('happy');load();setInterval(load,15000);
</script></body></html>
