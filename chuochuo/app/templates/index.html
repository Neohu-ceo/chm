<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>戳戳 — 桌面解压精灵</title>
<link rel="manifest" href="/static/manifest.json">
<style>
:root {
  --bg: #1a1a1a; --card: #252525; --text: #eee; --muted: #999;
  --accent: #ff6b35; --green: #6baf6b; --pink: #e8879a; --yellow: #f0c040;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, 'PingFang SC', sans-serif;
  background: var(--bg); color: var(--text);
  max-width: 420px; margin: 0 auto; min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

/* Header */
header {
  padding: 1.25rem; display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid #333; position: sticky; top: 0; background: var(--bg); z-index: 10;
}
header h1 { font-size: 1.2rem; font-weight: 700; }
header .streak { font-size: 0.8rem; color: var(--accent); }
header .streak em { font-style: normal; font-size: 1.1rem; }

/* Hero stats */
.stats-bar {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
  background: #333; margin: 1rem;
}
.stat {
  background: var(--bg); padding: 1rem; text-align: center;
}
.stat .val { font-size: 1.5rem; font-weight: 800; }
.stat .lbl { font-size: 0.7rem; color: var(--muted); margin-top: 0.2rem; }

/* Device card */
.device-card {
  margin: 0 1rem 1rem; background: var(--card); border-radius: 16px; padding: 1.25rem;
  display: flex; gap: 1rem; align-items: center;
}
.device-preview {
  width: 64px; height: 64px; background: #111; border-radius: 12px;
  display: grid; grid-template-columns: repeat(8,1fr); grid-template-rows: repeat(8,1fr);
  gap: 1.5px; padding: 8px;
}
.device-preview .px { border-radius: 2px; }
.device-info h3 { font-size: 0.9rem; margin-bottom: 0.2rem; }
.device-info .status { font-size: 0.75rem; color: var(--accent); }
.device-info .battery { font-size: 0.7rem; color: var(--muted); }

/* Tabs */
.tabs {
  display: flex; gap: 0; margin: 0 1rem; border-bottom: 1px solid #333;
}
.tab {
  flex: 1; padding: 0.75rem; text-align: center; font-size: 0.8rem;
  color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Leaderboard */
.lb-item {
  display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem;
  border-bottom: 1px solid #1a1a1a;
}
.lb-rank { width: 24px; font-weight: 800; font-size: 0.9rem; text-align: center; }
.lb-rank.gold { color: var(--yellow); }
.lb-rank.silver { color: #ccc; }
.lb-rank.bronze { color: #cd7f32; }
.lb-name { flex: 1; font-size: 0.85rem; }
.lb-score { font-size: 0.85rem; color: var(--accent); font-weight: 600; }

/* Expression grid */
.expr-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem;
  padding: 1rem;
}
.expr-card {
  background: var(--card); border-radius: 12px; padding: 0.75rem; text-align: center;
  cursor: pointer; transition: transform 0.15s;
}
.expr-card:active { transform: scale(0.95); }
.expr-preview {
  width: 48px; height: 48px; margin: 0 auto 0.5rem; background: #111; border-radius: 8px;
  display: grid; grid-template-columns: repeat(8,1fr); grid-template-rows: repeat(8,1fr);
  gap: 1px; padding: 6px;
}
.expr-card .name { font-size: 0.75rem; margin-bottom: 0.2rem; }
.expr-card .price { font-size: 0.7rem; color: var(--muted); }
.expr-card .price .free { color: var(--green); }

/* Auth */
.auth-form {
  margin: 2rem 1rem; background: var(--card); border-radius: 16px; padding: 1.5rem;
}
.auth-form input {
  width: 100%; padding: 0.75rem; margin-bottom: 0.75rem; border-radius: 10px;
  border: 1px solid #333; background: #111; color: #fff; font-size: 0.9rem;
}
.btn {
  width: 100%; padding: 0.85rem; border-radius: 12px; border: none;
  font-size: 0.9rem; font-weight: 700; cursor: pointer;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-outline { background: transparent; border: 1px solid #444; color: var(--text); }

.hidden { display: none; }

/* Toast */
.toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: #fff; padding: 0.75rem 1.5rem;
  border-radius: 24px; font-size: 0.85rem; z-index: 100;
  animation: toastIn 0.3s ease;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } }
</style>
</head>
<body>

<header>
  <h1>🖐️ 戳戳</h1>
  <div class="streak" id="streak-display"></div>
</header>

<!-- Auth (shown when not logged in) -->
<div id="auth-section">
  <div class="auth-form">
    <h3 style="margin-bottom:1rem;">登录戳戳</h3>
    <input type="text" id="username" placeholder="用户名">
    <input type="password" id="password" placeholder="密码">
    <button class="btn btn-primary" onclick="login()">登录</button>
    <button class="btn btn-outline" style="margin-top:0.5rem;" onclick="register()">注册新账号</button>
  </div>
</div>

<!-- Main app (shown when logged in) -->
<div id="app-section" class="hidden">

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat"><div class="val" id="stat-pokes">0</div><div class="lbl">今日戳击</div></div>
    <div class="stat"><div class="val" style="color:var(--accent);" id="stat-streak">0</div><div class="lbl">连续天数 🔥</div></div>
    <div class="stat"><div class="val" id="stat-devices">0</div><div class="lbl">设备数</div></div>
  </div>

  <!-- Device -->
  <div class="device-card" id="device-card">
    <div class="device-preview" id="device-face"></div>
    <div class="device-info">
      <h3 id="device-name">未配对设备</h3>
      <div class="status" id="device-status">点击配对</div>
      <div class="battery" id="device-battery"></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('leaderboard')">🏆 排行榜</div>
    <div class="tab" onclick="switchTab('expressions')">🎭 表情</div>
    <div class="tab" onclick="switchTab('me')">👤 我的</div>
  </div>

  <!-- Leaderboard -->
  <div id="tab-leaderboard"></div>

  <!-- Expressions -->
  <div id="tab-expressions" class="hidden"><div class="expr-grid" id="expr-grid"></div></div>

  <!-- Me -->
  <div id="tab-me" class="hidden" style="padding:1rem;">
    <button class="btn btn-primary" onclick="pairDevice()">📱 配对新设备</button>
    <button class="btn btn-outline" style="margin-top:0.75rem;" onclick="upgradePro()">⭐ 升级 Pro (¥19/月)</button>
    <button class="btn btn-outline" style="margin-top:0.75rem;" onclick="logout()">退出登录</button>
  </div>

</div>

<script>
const API = 'http://localhost:5002';

let currentTab = 'leaderboard';

async function api(path, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'}, credentials: 'include' };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API+path, opts);
  return r.json();
}

async function login() {
  const r = await api('/api/auth/login', 'POST', {
    username: document.getElementById('username').value,
    password: document.getElementById('password').value,
  });
  if (r.success) loadApp();
  else toast(r.error || '登录失败');
}

async function register() {
  const r = await api('/api/auth/register', 'POST', {
    username: document.getElementById('username').value || 'user_'+Date.now()%10000,
    password: document.getElementById('password').value || '123456',
  });
  if (r.success) loadApp();
  else toast(r.error || '注册失败');
}

async function loadApp() {
  document.getElementById('auth-section').classList.add('hidden');
  document.getElementById('app-section').classList.remove('hidden');
  await loadStats();
  await loadDevices();
  await loadLeaderboard();
  await loadExpressions();
}

async function loadStats() {
  const r = await api('/api/stats');
  document.getElementById('stat-pokes').textContent = r.today_pokes || 0;
  document.getElementById('stat-streak').textContent = r.streak_days || 0;
  document.getElementById('stat-devices').textContent = r.devices || 0;
  document.getElementById('streak-display').innerHTML = r.streak_days > 0 ? `🔥 <em>${r.streak_days}</em>天` : '';
}

async function loadDevices() {
  const r = await api('/api/devices');
  if (r.devices?.length > 0) {
    const d = r.devices[0];
    document.getElementById('device-name').textContent = d.device_name;
    document.getElementById('device-status').textContent = d.last_seen ? '🟢 在线' : '🟡 离线';
    document.getElementById('device-battery').textContent = '固件 '+d.firmware_version;
    renderFace(document.getElementById('device-face'), 'happy');
  }
}

function renderFace(el, emotion) {
  const patterns = {
    happy:   '00111000,01000100,10000010,10000010,00000000,10000001,01000010,00111100',
    sleepy:  '00000000,00000000,01111000,01000100,01000100,00000000,00011000,00100000',
    angry:   '01000010,00000000,01111110,01000010,00000000,01001000,00000000,00110000',
    surprised:'00111100,01000010,00000000,01111110,00000000,01000010,00000000,00000000',
    heart:   '00000000,01100110,11111111,11111111,01111110,00111100,00011000,00000000',
    party:   '01010101,10101010,01010101,10101010,01010101,10101010,01010101,10101010',
  };
  const pat = (patterns[emotion] || patterns.happy).split(',');
  let h = '';
  for (let row=0; row<8; row++) {
    for (let col=0; col<8; col++) {
      const on = pat[row][col] === '1';
      h += `<div class="px" style="background:${on?'var(--accent)':'#222'}"></div>`;
    }
  }
  el.innerHTML = h;
}

async function loadLeaderboard() {
  const r = await api('/api/leaderboard');
  const lb = r.leaderboard || [];
  document.getElementById('tab-leaderboard').innerHTML = lb.map((u,i) => {
    const rank = i+1;
    const cls = rank===1?'gold':rank===2?'silver':rank===3?'bronze':'';
    return `<div class="lb-item">
      <div class="lb-rank ${cls}">${rank===1?'👑':rank===2?'🥈':rank===3?'🥉':rank}</div>
      <div class="lb-name">${u.username||'匿名'}</div>
      <div class="lb-score">${u.weekly_score||0}戳/周</div>
    </div>`;
  }).join('') || '<div style="padding:2rem;text-align:center;color:var(--muted);">还没有数据，来戳第一下！</div>';
}

async function loadExpressions() {
  const r = await api('/api/expressions');
  document.getElementById('expr-grid').innerHTML = (r.expressions||[]).map(e => `
    <div class="expr-card" onclick="buyExpr('${e.id}')">
      <div class="expr-preview" id="expr-${e.id}"></div>
      <div class="name">${e.name}</div>
      <div class="price"><span class="${e.price===0?'free':''}">${e.price===0?'免费':e.price+'戳币'}</span> · ${e.downloads||0}次</div>
    </div>
  `).join('');
  // Render each expression face
  (r.expressions||[]).forEach(e => {
    renderFace(document.getElementById('expr-'+e.id), e.id);
  });
}

async function buyExpr(id) {
  const r = await api('/api/expressions/purchase', 'POST', {expression_id:id});
  if (r.success) toast('✅ 已获得新表情！');
  else toast(r.error||'获取失败');
  loadExpressions();
}

async function pairDevice() {
  const name = prompt('给你的戳戳起个名字:', '我的戳戳') || '我的戳戳';
  const r = await api('/api/devices/pair', 'POST', {name});
  if (r.device_id) toast('✅ 设备已配对！密钥已复制');
  loadDevices();
}

async function upgradePro() {
  const r = await api('/api/subscription/upgrade', 'POST', {plan:'pro'});
  if (r.success) toast('✅ 已升级 Pro！');
  else toast(r.error||'升级失败');
}

async function logout() {
  document.getElementById('auth-section').classList.remove('hidden');
  document.getElementById('app-section').classList.add('hidden');
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.add('hidden'));
  document.querySelector(`.tab:nth-child(${tab==='leaderboard'?1:tab==='expressions'?2:3})`).classList.add('active');
  document.getElementById('tab-'+tab).classList.remove('hidden');
  if (tab==='leaderboard') loadLeaderboard();
  if (tab==='expressions') loadExpressions();
}

function toast(msg) {
  const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2500);
}

// Auto-login if session exists
api('/api/stats').then(r => { if (!r.error) loadApp(); });
</script>
</body>
</html>
