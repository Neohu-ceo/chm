{% include "base_styles.html" %}
<div class="nav">
    <a href="/dashboard" class="nav-brand">🏠 Lighthouse</a>
    <div class="nav-links">
        <a href="/dashboard">控制台</a>
        <a href="/pricing">升级</a>
        <a href="/settings">设置</a>
        <a href="#" onclick="logout()" style="color:var(--red)">退出</a>
    </div>
</div>

<div class="container" style="max-width:700px;">
    <h2 style="margin-bottom:2rem;">⚙️ 账户设置</h2>

    <!-- Profile -->
    <div class="card">
        <h3>👤 个人信息</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
            <div>
                <div style="font-size:.8rem;color:var(--text-muted);margin-bottom:.25rem;">姓名</div>
                <div style="font-weight:600;" id="profile-name">—</div>
            </div>
            <div>
                <div style="font-size:.8rem;color:var(--text-muted);margin-bottom:.25rem;">邮箱</div>
                <div style="font-weight:600;" id="profile-email">—</div>
            </div>
            <div>
                <div style="font-size:.8rem;color:var(--text-muted);margin-bottom:.25rem;">公司</div>
                <div id="profile-company" style="font-weight:600;">—</div>
            </div>
            <div>
                <div style="font-size:.8rem;color:var(--text-muted);margin-bottom:.25rem;">注册时间</div>
                <div id="profile-created" style="font-weight:600;">—</div>
            </div>
        </div>
    </div>

    <!-- Subscription Details -->
    <div class="card">
        <h3>💳 订阅详情</h3>
        <div id="sub-details" style="font-size:.9rem;">加载中...</div>
    </div>

    <!-- License Keys -->
    <div class="card">
        <h3>🎫 许可证密钥</h3>
        <p style="font-size:.85rem;color:var(--text-muted);margin-bottom:1rem;">
            用于 CLI 离线验证。付费用户可生成。
        </p>
        <div id="license-section">加载中...</div>
    </div>

    <!-- API Keys Management -->
    <div class="card">
        <h3>🔑 API 密钥管理</h3>
        <div id="api-keys-full">加载中...</div>
        <button class="btn btn-outline" style="margin-top:.75rem;" onclick="createApiKey()">+ 创建新密钥</button>
        <button class="btn btn-outline" style="margin-top:.75rem;" onclick="generateLicense()">🎫 生成许可证</button>
    </div>
</div>

<script>
async function load() {
    const meRes = await fetch('/api/auth/me');
    const meData = await meRes.json();
    const u = meData.user || {};
    document.getElementById('profile-name').textContent = u.name || '—';
    document.getElementById('profile-email').textContent = u.email || '—';
    document.getElementById('profile-company').textContent = u.company || '未设置';
    document.getElementById('profile-created').textContent = u.created_at?.slice(0,10) || '—';

    const sub = meData.subscription;
    const subDiv = document.getElementById('sub-details');
    if (sub) {
        subDiv.innerHTML = `
            <p><strong>方案:</strong> <span class="badge badge-blue">${sub.plan.toUpperCase()}</span></p>
            <p><strong>状态:</strong> <span class="badge badge-${sub.status === 'active' ? 'green' : 'red'}">${sub.status}</span></p>
            <p><strong>周期开始:</strong> ${sub.current_period_start?.slice(0,10) || '—'}</p>
            <p><strong>周期结束:</strong> ${sub.current_period_end?.slice(0,10) || '—'}</p>
            ${sub.plan === 'free' ? '<p style="margin-top:.5rem;"><a href="/pricing" style="color:var(--primary);">升级到付费方案 →</a></p>' : ''}
        `;
        document.getElementById('license-section').innerHTML = sub.plan !== 'free'
            ? '<button class="btn btn-outline" onclick="generateLicense()">🎫 生成许可证密钥</button>'
            : '<p style="color:var(--text-muted);font-size:.85rem;">许可证需要付费方案。请先升级。</p>';
    }

    loadApiKeysFull();
}

async function loadApiKeysFull() {
    const res = await fetch('/api/keys');
    const data = await res.json();
    const keys = data.keys || [];
    document.getElementById('api-keys-full').innerHTML = keys.length === 0
        ? '<p style="color:var(--text-muted);">暂无 API 密钥</p>'
        : keys.map(k => `
            <div style="padding:.5rem 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
                <div>
                    <code>${k.key_prefix}...</code>
                    <br><small style="color:var(--text-muted);">${k.name} · ${k.created_at?.slice(0,10)}</small>
                </div>
                <span class="badge badge-${k.revoked ? 'red' : 'green'}">${k.revoked ? '已吊销' : '活跃'}</span>
            </div>
        `).join('');
}

async function createApiKey() {
    const name = prompt('密钥名称:');
    if (!name) return;
    const res = await fetch('/api/keys', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name}),
    });
    const data = await res.json();
    if (data.key) {
        alert(`🔑 新密钥（仅显示一次！请立即复制保存）:\n\n${data.key}`);
    }
    loadApiKeysFull();
}

async function generateLicense() {
    const res = await fetch('/api/license', {method: 'POST'});
    const data = await res.json();
    if (data.license_key) {
        alert(`🎫 许可证密钥:\n\n${data.license_key}\n\n方案: ${data.plan}\n过期: ${data.expires_at?.slice(0,10)}`);
    } else {
        alert('❌ ' + (data.error || '生成失败'));
    }
}

async function logout() {
    await fetch('/api/auth/logout', {method: 'POST'});
    window.location.href = '/login';
}

load();
</script>
