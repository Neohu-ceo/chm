{% include "base_styles.html" %}
<div style="max-width:420px;margin:4rem auto;padding:2rem;">
    <div style="text-align:center;margin-bottom:2rem;">
        <h1 style="font-size:2rem;">🏠 创建账户</h1>
        <p style="color:var(--text-muted);margin-top:.5rem;">免费开始使用 Codebase Health Monitor</p>
    </div>
    <div class="card" style="padding:2rem;">
        <div id="error" class="flash flash-error" style="display:none;"></div>
        <form id="regForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="name" placeholder="你的姓名" required>
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>公司（可选）</label>
                <input type="text" id="company" placeholder="公司名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="至少 6 个字符" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem;">创建免费账户</button>
        </form>
        <p style="text-align:center;margin-top:1rem;font-size:.875rem;color:var(--text-muted);">
            已有账号？<a href="/login" style="color:var(--primary);">登录</a>
        </p>
    </div>
</div>
<script>
async function handleRegister(e) {
    e.preventDefault();
    document.getElementById('error').style.display = 'none';
    const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            company: document.getElementById('company').value,
            password: document.getElementById('password').value,
        })
    });
    const data = await res.json();
    if (res.ok) {
        window.location.href = '/dashboard';
    } else {
        const err = document.getElementById('error');
        err.textContent = data.error || '注册失败';
        err.style.display = 'block';
    }
}
</script>
