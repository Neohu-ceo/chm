<style>
    :root {
        --bg: #f8fafc;
        --surface: #ffffff;
        --text: #0f172a;
        --text-muted: #64748b;
        --border: #e2e8f0;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --green: #10b981;
        --yellow: #f59e0b;
        --red: #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg); color: var(--text); line-height: 1.6;
        min-height: 100vh;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .nav {
        display: flex; justify-content: space-between; align-items: center;
        padding: 1rem 2rem; background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .nav-brand { font-weight: 700; font-size: 1.1rem; text-decoration: none; color: var(--text); }
    .nav-links { display: flex; gap: 1.5rem; align-items: center; }
    .nav-links a { text-decoration: none; color: var(--text-muted); font-size: .9rem; font-weight: 500; }
    .nav-links a:hover { color: var(--text); }
    .btn {
        display: inline-block; padding: .55rem 1.25rem; border-radius: 8px;
        font-weight: 600; font-size: .875rem; text-decoration: none; cursor: pointer;
        transition: all .15s; border: none;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-outline { border: 2px solid var(--border); color: var(--text); background: transparent; }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    .btn-danger { background: var(--red); color: white; }
    .btn-large { padding: .8rem 2rem; font-size: 1rem; }
    .card {
        background: var(--surface); border-radius: 12px; padding: 1.5rem;
        border: 1px solid var(--border); margin-bottom: 1.5rem;
    }
    .card h3 { font-size: 1.1rem; margin-bottom: 1rem; }
    .flash { padding: .75rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: .9rem; }
    .flash-error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .flash-success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-weight: 600; font-size: .875rem; margin-bottom: .35rem; }
    .form-group input {
        width: 100%; padding: .65rem .75rem; border: 1px solid var(--border);
        border-radius: 8px; font-size: .9rem; transition: border-color .15s;
    }
    .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    th { text-align: left; padding: .6rem .75rem; background: #f8fafc; color: var(--text-muted); font-weight: 600; font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; }
    td { padding: .5rem .75rem; border-bottom: 1px solid var(--border); }
    .badge { display: inline-block; padding: .2rem .6rem; border-radius: 12px; font-size: .75rem; font-weight: 600; }
    .badge-green { background: #ecfdf5; color: #065f46; }
    .badge-yellow { background: #fffbeb; color: #92400e; }
    .badge-blue { background: #eff6ff; color: #1e40af; }
    .badge-red { background: #fef2f2; color: #991b1b; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .metric-value { font-size: 2rem; font-weight: 800; }
    .metric-label { font-size: .8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }
    @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
</style>
