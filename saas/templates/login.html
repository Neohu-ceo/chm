{% include "base_styles.html" %}
<div style="max-width:420px;margin:5rem auto;padding:2rem;">
    <div style="text-align:center;margin-bottom:2rem;">
        <h1 style="font-size:2rem;">🏠 Lighthouse</h1>
        <p style="color:var(--text-muted);margin-top:.5rem;">登录到你的账户</p>
    </div>
    <div class="card" style="padding:2rem;">
        <div id="error" class="flash flash-error" style="display:none;"></div>
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="输入密码" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem;">登录</button>
        </form>
        <p style="text-align:center;margin-top:1rem;font-size:.875rem;color:var(--text-muted);">
            还没有账号？<a href="/register" style="color:var(--primary);">注册</a>
        </p>
    </div>
</div>
<script>
async function handleLogin(e) {
    e.preventDefault();
    document.getElementById('error').style.display = 'none';
    const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
        })
    });
    const data = await res.json();
    if (res.ok) {
        window.location.href = '/dashboard';
    } else {
        const err = document.getElementById('error');
        err.textContent = data.error || '登录失败';
        err.style.display = 'block';
    }
}
</script>
